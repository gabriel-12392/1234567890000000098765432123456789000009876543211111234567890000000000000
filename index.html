<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>აბონენტთა მართვის სისტემა (Supabase)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #f3f4f6; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg mt-10">
        <!-- მთავარი მენიუ -->
        <div id="main-menu" class="text-center">
            <h1 class="text-2xl font-bold mb-6">სისტემაში შესვლა</h1>
            <button onclick="showSection('user-login')" class="w-full bg-blue-600 text-white py-3 rounded-lg mb-4">მომხმარებელი</button>
            <button onclick="showSection('staff-auth')" class="w-full bg-gray-800 text-white py-3 rounded-lg">თანამშრომელი</button>
        </div>

        <!-- მომხმარებლის შესვლა -->
        <div id="user-login" class="hidden">
            <h2 class="text-xl font-bold mb-4">მომხმარებლის შესვლა</h2>
            <input id="u-code" type="text" placeholder="აბონენტის კოდი" class="w-full border p-2 mb-3 rounded">
            <input id="u-pass" type="password" placeholder="პაროლი" class="w-full border p-2 mb-4 rounded">
            <button onclick="loginAsUser()" class="w-full bg-blue-600 text-white py-2 rounded">შესვლა</button>
            <button onclick="goBack()" class="w-full text-gray-500 mt-4">უკან</button>
        </div>

        <!-- თანამშრომლის ავტორიზაცია -->
        <div id="staff-auth" class="hidden">
            <h2 class="text-xl font-bold mb-4 text-red-600">თანამშრომლის კოდი</h2>
            <input id="staff-pin" type="password" placeholder="შეიყვანეთ" class="w-full border p-2 mb-4 rounded text-center text-2xl tracking-widest">
            <button onclick="checkStaffPin()" class="w-full bg-red-600 text-white py-2 rounded">შესვლა</button>
            <button onclick="goBack()" class="w-full text-gray-500 mt-4">უკან</button>
        </div>

        <!-- თანამშრომლის პანელი -->
        <div id="staff-panel" class="hidden">
            <h2 class="text-xl font-bold mb-4 border-b pb-2">თანამშრომლის სამუშაო სივრცე</h2>
            
            <div class="mb-8 bg-blue-50 p-4 rounded-lg">
                <h3 class="font-bold mb-2">ახალი რეგისტრაცია</h3>
                <input id="reg-id" placeholder="პირადი ნომერი" class="w-full border p-2 mb-2 rounded text-sm">
                <input id="reg-code" placeholder="აბონენტის ნომერი" class="w-full border p-2 mb-2 rounded text-sm">
                <input id="reg-fname" placeholder="სახელი" class="w-full border p-2 mb-2 rounded text-sm">
                <input id="reg-lname" placeholder="გვარი" class="w-full border p-2 mb-2 rounded text-sm">
                <input id="reg-phone" placeholder="ტელეფონი" class="w-full border p-2 mb-2 rounded text-sm">
                <input id="reg-pass" type="password" placeholder="პაროლი" class="w-full border p-2 mb-2 rounded text-sm">
                <button onclick="registerUser()" class="w-full bg-green-600 text-white py-2 rounded mt-2">რეგისტრაცია</button>
            </div>

            <div class="bg-yellow-50 p-4 rounded-lg">
                <h3 class="font-bold mb-2">აბონენტის ძებნა</h3>
                <input id="search-code" placeholder="შეიყვანეთ აბონენტის კოდი" class="w-full border p-2 mb-2 rounded">
                <button onclick="searchUser()" class="w-full bg-yellow-600 text-white py-2 rounded">ძებნა</button>
            </div>

            <div id="search-result" class="mt-4 p-4 border rounded hidden bg-white"></div>

            <button onclick="logout()" class="w-full bg-gray-400 text-white py-2 rounded mt-6">გამოსვლა</button>
        </div>

        <!-- მომხმარებლის პანელი -->
        <div id="user-panel" class="hidden">
            <h2 class="text-xl font-bold mb-4 border-b pb-2">ჩემი მონაცემები</h2>
            <div id="user-info" class="space-y-2 text-gray-700"></div>
            <div class="mt-6 p-4 bg-blue-100 rounded text-center">
                <p class="text-sm">მიმდინარე ბალანსი</p>
                <p id="user-balance-view" class="text-3xl font-bold text-blue-700">0.00 ₾</p>
            </div>
            <button onclick="logout()" class="w-full bg-gray-400 text-white py-2 rounded mt-6">გამოსვლა</button>
        </div>
    </div>

    <script>
        // --- SUPABASE კონფიგურაცია ---
        const SUPABASE_URL = 'https://gdtjwafwyfnoirrwssak.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkdGp3YWZ3eWZub2lycndzc2FrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyODU2NjYsImV4cCI6MjA4Nzg2MTY2Nn0.XmYKQAbuDcRj72CzM42DyC-lR9_9FhpgAiifOqRQbKU';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ნავიგაციის ფუნქციები
        function showSection(id) {
            document.querySelectorAll('body > div > div').forEach(el => el.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function goBack() { showSection('main-menu'); }
        function logout() { location.reload(); }

        // თანამშრომლის PIN-ის შემოწმება
        function checkStaffPin() {
            if(document.getElementById('staff-pin').value === '5445') {
                showSection('staff-panel');
            } else {
                alert('არასწორი კოდი!');
            }
        }

        // --- BACKEND ფუნქციები (SUPABASE) ---

        // 1. რეგისტრაცია
        async function registerUser() {
            const newUser = {
                id: document.getElementById('reg-id').value,
                code: document.getElementById('reg-code').value,
                fname: document.getElementById('reg-fname').value,
                lname: document.getElementById('reg-lname').value,
                phone: document.getElementById('reg-phone').value,
                pass: document.getElementById('reg-pass').value,
                balance: document.getElementById('reg-balance').value,
            };

            if(!newUser.code || !newUser.pass) return alert('შეავსეთ აუცილებელი ველები!');

            const { error } = await _supabase.from('users_list').insert([newUser]);

            if (error) {
                alert('შეცდომა რეგისტრაციისას: ' + error.message);
            } else {
                alert('აბონენტი წარმატებით დარეგისტრირდა!');
                document.querySelectorAll('#staff-panel input').forEach(i => i.value = '');
            }
        }

        // 2. ძებნა თანამშრომლის მიერ
        async function searchUser() {
            const code = document.getElementById('search-code').value;
            const { data: user, error } = await _supabase
                .from('users_list')
                .select('*')
                .eq('code', code)
                .single();

            const resDiv = document.getElementById('search-result');

            if(user) {
                resDiv.classList.remove('hidden');
                resDiv.innerHTML = `
                    <p><b>სახელი:</b> ${user.fname} ${user.lname}</p>
                    <p><b>პირადი №:</b> ${user.id}</p>
                    <p><b>ტელეფონი:</b> ${user.phone}</p>
                    <hr class="my-2">
                    <p class="text-lg">ბალანსი: <span class="font-bold text-green-600">${user.balance.toFixed(2)} ₾</span></p>
                    <div class="flex gap-2 mt-2">
                        <input id="amt" type="number" step="0.01" placeholder="თანხა" class="w-1/2 border p-1 rounded">
                        <button onclick="updateBalance('${user.code}', ${user.balance}, 'add')" class="bg-green-500 text-white px-2 rounded">+</button>
                        <button onclick="updateBalance('${user.code}', ${user.balance}, 'sub')" class="bg-red-500 text-white px-2 rounded">-</button>
                    </div>
                `;
            } else {
                alert('მომხმარებელი ვერ მოიძებნა');
                resDiv.classList.add('hidden');
            }
        }

        // 3. ბალანსის განახლება
        async function updateBalance(code, currentBalance, type) {
            const amtValue = document.getElementById('amt').value;
            const amt = parseFloat(amtValue);
            if(isNaN(amt) || amt <= 0) return alert('შეიყვანეთ სწორი თანხა');

            const newBalance = type === 'add' ? currentBalance + amt : currentBalance - amt;

            const { error } = await _supabase
                .from('users_list')
                .update({ balance: newBalance })
                .eq('code', code);

            if (error) {
                alert('შეცდომა ბალანსის განახლებისას');
            } else {
                searchUser(); // ინფორმაციის განახლება ეკრანზე
            }
        }

        // 4. მომხმარებლის შესვლა (ავტორიზაცია)
        async function loginAsUser() {
            const code = document.getElementById('u-code').value;
            const pass = document.getElementById('u-pass').value;

            const { data: user, error } = await _supabase
                .from('users_list')
                .select('*')
                .eq('code', code)
                .eq('pass', pass)
                .single();

            if(user) {
                showSection('user-panel');
                document.getElementById('user-info').innerHTML = `
                    <p><b>აბონენტი:</b> ${user.fname} ${user.lname}</p>
                    <p><b>პირადი ნომერი:</b> ${user.id}</p>
                    <p><b>კოდი:</b> ${user.code}</p>
                    <p><b>ტელეფონი:</b> ${user.phone}</p>
                `;
                document.getElementById('user-balance-view').innerText = user.balance.toFixed(2) + ' ₾';
            } else {
                alert('არასწორი აბონენტის კოდი ან პაროლი!');
            }
        }
    </script>
</body>
</html>
